<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Detalhes da empresa no Guia de Chimoio" />

    <title>Empresa • Guia de Negócios</title>

    <link rel="stylesheet" href="css/style.css" />

    <style>
      /* ============================================
           ESTILOS POR PLANO
           ============================================ */

      /* Plano Básico */
      .pagina-basico {
        max-width: 800px;
        margin: 0 auto;
      }

      .pagina-basico .header {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 32px;
        text-align: center;
        margin-bottom: 24px;
      }

      .pagina-basico .logo-placeholder {
        width: 120px;
        height: 120px;
        background: var(--bg);
        border-radius: 50%;
        margin: 0 auto 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 60px;
      }

      .pagina-basico h1 {
        font-size: 28px;
        margin-bottom: 8px;
      }

      /* Plano Pro */
      .pagina-pro {
        --cor-primaria: #3b82f6;
        --cor-secundaria: #1e40af;
      }

      .pagina-pro .banner {
        width: 100%;
        height: 300px;
        object-fit: cover;
        border-radius: 20px 20px 0 0;
      }

      .pagina-pro .header-pro {
        background: var(--card);
        border: 1px solid var(--line);
        border-top: none;
        border-radius: 0 0 20px 20px;
        padding: 32px;
        margin-bottom: 24px;
        position: relative;
      }

      .pagina-pro .logo-pro {
        width: 150px;
        height: 150px;
        border-radius: 20px;
        border: 4px solid var(--card);
        position: absolute;
        top: -75px;
        left: 32px;
        object-fit: cover;
        background: var(--bg);
      }

      .pagina-pro .header-content {
        margin-left: 190px;
        padding-top: 20px;
      }

      .pagina-pro h1 {
        font-size: 32px;
        margin-bottom: 8px;
        color: var(--cor-primaria);
      }

      /* Plano VIP */
      .pagina-vip {
        --cor-primaria: #ef4444;
        --cor-secundaria: #dc2626;
      }

      .pagina-vip .hero-vip {
        background: linear-gradient(
          135deg,
          var(--cor-primaria),
          var(--cor-secundaria)
        );
        border-radius: 20px;
        padding: 60px 40px;
        color: white;
        margin-bottom: 24px;
        position: relative;
        overflow: hidden;
      }

      .pagina-vip .hero-vip::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/></svg>');
        opacity: 0.3;
      }

      .pagina-vip .hero-content {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 32px;
        align-items: center;
      }

      .pagina-vip .logo-vip {
        width: 180px;
        height: 180px;
        border-radius: 24px;
        border: 6px solid rgba(255, 255, 255, 0.3);
        object-fit: cover;
      }

      .pagina-vip .hero-text h1 {
        font-size: 42px;
        margin-bottom: 12px;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
      }

      .pagina-vip .badge-vip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.2);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 600;
        backdrop-filter: blur(10px);
      }

      /* Componentes Comuns */
      .galeria {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin: 24px 0;
      }

      .galeria img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 12px;
        transition: transform 0.2s;
        cursor: pointer;
      }

      .galeria img:hover {
        transform: scale(1.05);
      }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }

      .info-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 24px;
      }

      .info-card h3 {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
        margin-bottom: 16px;
      }

      .info-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 16px;
      }

      .info-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }

      .btn-whatsapp {
        background: #25d366;
        color: white;
        border: none;
        padding: 14px 28px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }

      .btn-whatsapp:hover {
        background: #128c7e;
      }

      .nao-encontrada {
        text-align: center;
        padding: 80px 20px;
      }

      .servicos-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .servico-tag {
        background: var(--bg);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
      }

      /* Lightbox */
      .lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.9);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .lightbox.active {
        display: flex;
      }

      .lightbox img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
        border-radius: 8px;
      }

      .lightbox-close {
        position: absolute;
        top: 20px;
        right: 20px;
        color: white;
        font-size: 40px;
        cursor: pointer;
        background: none;
        border: none;
      }

      @media (max-width: 768px) {
        .pagina-pro .header-content {
          margin-left: 0;
          margin-top: 80px;
          text-align: center;
        }
        .pagina-pro .logo-pro {
          left: 50%;
          transform: translateX(-50%);
        }
        .pagina-vip .hero-content {
          grid-template-columns: 1fr;
          text-align: center;
        }
        .pagina-vip .logo-vip {
          margin: 0 auto;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navegação -->
    <nav class="nav">
      <div class="wrap">
        <div class="brand">
          <span>Guia de Negócios</span>
          <span class="badge">Detalhes</span>
        </div>
        <div class="menu">
          <a href="index.html">Home</a>
          <a href="categorias.html">Categorias</a>
          <a href="anunciar.html">Anunciar</a>
          <a href="contato.html">Contato</a>
          <button id="themeToggle" class="btn" type="button">
            <span id="themeIcon">🌙</span>
          </button>
        </div>
      </div>
    </nav>

    <!-- Conteúdo -->
    <main class="container">
      <div id="empresaContainer">
        <div style="text-align: center; padding: 60px">
          <p>Carregando...</p>
        </div>
      </div>
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="fecharLightbox()">
      <button class="lightbox-close">×</button>
      <img id="lightboxImg" src="" alt="Visualização" />
    </div>

    <!-- Rodapé -->
    <footer class="footer">
      <p>&copy; <span id="ano"></span> Guia de Negócios</p>
    </footer>

    <script>
      /**
       * ============================================
       * CONFIGURAÇÃO
       * ============================================
       */
      const CONFIG = {
        CHAVE_EMPRESAS: "guia_chimoio_empresas_v2",
      };

      /**
       * ============================================
       * SERVIÇOS
       * ============================================
       */
      const ServicoEmpresas = {
        buscarPorId(id) {
          try {
            const dados = localStorage.getItem(CONFIG.CHAVE_EMPRESAS);
            if (!dados) return null;

            const empresas = JSON.parse(dados);
            return (
              empresas.find((e) => e.id == id && e.ativo !== false) || null
            );
          } catch (erro) {
            console.error("Erro ao buscar empresa:", erro);
            return null;
          }
        },
      };

      /**
       * ============================================
       * RENDERIZAÇÃO POR PLANO (COM BASE64)
       * ============================================
       */
      const RenderizadorPagina = {
        /**
         * Renderiza página completa baseada no plano
         */
        renderizar(empresa) {
          const container = document.getElementById("empresaContainer");
          const whatsapp =
            empresa.whatsapp || empresa.contacto.replace(/\D/g, "");
          const linkWhats = `https://wa.me/${whatsapp}?text=${encodeURIComponent(`Olá! Vi a empresa "${empresa.nome}" no Guia de Negócios de Chimoio. Quero mais informações.`)}`;

          // Escolher layout baseado no plano
          if (empresa.plano === "vip") {
            container.innerHTML = this._renderizarVIP(empresa, linkWhats);
          } else if (empresa.plano === "pro") {
            container.innerHTML = this._renderizarPro(empresa, linkWhats);
          } else {
            container.innerHTML = this._renderizarBasico(empresa, linkWhats);
          }
        },

        /**
         * Plano Básico
         */
        _renderizarBasico(e, linkWhats) {
          const imagens = this._renderizarGaleria(e.imagens, "basico");

          return `
                    <div class="pagina-basico">
                        <div class="header">
                            <div class="logo-placeholder">🏢</div>
                            <h1>${e.nome}</h1>
                            <p style="color: var(--muted);">${e.categoria} • ${e.bairro}</p>
                            ${e.destaque ? '<p style="margin-top: 8px;">⭐ Em destaque</p>' : ""}
                        </div>

                        ${imagens}

                        <div class="info-card">
                            <h3>📝 Sobre</h3>
                            <p style="line-height: 1.8;">${e.descricao || "Sem descrição disponível."}</p>
                            
                            ${
                              e.servicos
                                ? `
                                <h3 style="margin-top: 24px;">🛎️ Serviços</h3>
                                <div class="servicos-list">
                                    ${e.servicos.map((s) => `<span class="servico-tag">${s}</span>`).join("")}
                                </div>
                            `
                                : ""
                            }
                        </div>

                        <div class="info-grid">
                            <div class="info-card">
                                <h3>📞 Contacto</h3>
                                <div class="info-item">
                                    <div class="info-icon">📱</div>
                                    <div>
                                        <div style="font-size: 12px; color: var(--muted);">Telefone</div>
                                        <div style="font-weight: 600;">${e.contacto}</div>
                                    </div>
                                </div>
                                ${
                                  e.whatsapp
                                    ? `
                                <div class="info-item">
                                    <div class="info-icon">💬</div>
                                    <div>
                                        <div style="font-size: 12px; color: var(--muted);">WhatsApp</div>
                                        <div style="font-weight: 600;">+${e.whatsapp}</div>
                                    </div>
                                </div>
                                `
                                    : ""
                                }
                                <div class="info-item">
                                    <div class="info-icon">📍</div>
                                    <div>
                                        <div style="font-size: 12px; color: var(--muted);">Endereço</div>
                                        <div style="font-weight: 600;">${e.endereco || e.bairro}</div>
                                    </div>
                                </div>
                            </div>

                            <div class="info-card">
                                <h3>🕐 Funcionamento</h3>
                                <div class="info-item">
                                    <div class="info-icon">📅</div>
                                    <div>
                                        <div style="font-size: 12px; color: var(--muted);">Horário</div>
                                        <div style="font-weight: 600;">${e.horario}</div>
                                    </div>
                                </div>
                                ${
                                  e.horario_fim_semana
                                    ? `
                                <div class="info-item">
                                    <div class="info-icon">🗓️</div>
                                    <div>
                                        <div style="font-size: 12px; color: var(--muted);">Fim de Semana</div>
                                        <div style="font-weight: 600;">${e.horario_fim_semana}</div>
                                    </div>
                                </div>
                                `
                                    : ""
                                }
                            </div>
                        </div>

                        <div style="text-align: center; margin-top: 32px;">
                            <a href="${linkWhats}" target="_blank" rel="noopener noreferrer" class="btn-whatsapp">
                                💬 Falar no WhatsApp
                            </a>
                        </div>

                        <div style="text-align: center; margin-top: 24px;">
                            <a href="javascript:history.back()" class="btn btn-outline">← Voltar</a>
                        </div>
                    </div>
                `;
        },

        /**
         * Plano Pro
         */
        _renderizarPro(e, linkWhats) {
          const cores = e.cores || {
            primaria: "#3b82f6",
            secundaria: "#1e40af",
          };
          const imagens = this._renderizarGaleria(e.imagens, "pro");
          const redes = e.redes ? this._renderizarRedes(e.redes) : "";

          return `
                    <div class="pagina-pro" style="--cor-primaria: ${cores.primaria}; --cor-secundaria: ${cores.secundaria};">
                        ${e.banner ? `<img src="${e.banner}" class="banner" alt="Banner ${e.nome}" onerror="this.style.display='none'">` : ""}
                        
                        <div class="header-pro">
                            <img src="${e.imagens && e.imagens[0] ? e.imagens[0] : ""}" 
                                 class="logo-pro" 
                                 alt="${e.nome}"
                                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22><rect fill=%22%23f3f4f6%22 width=%22150%22 height=%22150%22/><text fill=%22%239ca3af%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2260%22>🏢</text></svg>'">
                            <div class="header-content">
                                <h1>${e.nome}</h1>
                                <p style="color: var(--muted);">${e.categoria} • ${e.bairro}</p>
                                <span style="display: inline-flex; align-items: center; gap: 6px; background: rgba(59, 130, 246, 0.1); color: #3b82f6; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 8px;">
                                    ⭐ Plano Pro
                                </span>
                                ${redes}
                            </div>
                        </div>

                        ${imagens}

                        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
                            <div>
                                <div class="info-card">
                                    <h3>📝 Sobre</h3>
                                    <p style="line-height: 1.8;">${e.descricao || "Sem descrição disponível."}</p>
                                </div>
                                
                                ${
                                  e.servicos
                                    ? `
                                <div class="info-card" style="margin-top: 24px;">
                                    <h3>🛎️ Serviços</h3>
                                    <div class="servicos-list">
                                        ${e.servicos.map((s) => `<span class="servico-tag">${s}</span>`).join("")}
                                    </div>
                                </div>
                                `
                                    : ""
                                }
                            </div>

                            <div>
                                <div class="info-card">
                                    <h3>📞 Contacto</h3>
                                    <p><strong>📱</strong> ${e.contacto}</p>
                                    ${e.whatsapp ? `<p style="margin-top: 8px;"><strong>💬</strong> +${e.whatsapp}</p>` : ""}
                                    <p style="margin-top: 8px;"><strong>📍</strong> ${e.endereco || e.bairro}</p>
                                    <p style="margin-top: 8px;"><strong>⏰</strong> ${e.horario}</p>
                                    
                                    <a href="${linkWhats}" target="_blank" rel="noopener noreferrer" class="btn-whatsapp" style="width: 100%; justify-content: center; margin-top: 16px;">
                                        💬 WhatsApp
                                    </a>
                                </div>
                            </div>
                        </div>

                        <div style="text-align: center; margin-top: 32px;">
                            <a href="javascript:history.back()" class="btn btn-outline">← Voltar</a>
                        </div>
                    </div>
                `;
        },

        /**
         * Plano VIP
         */
        _renderizarVIP(e, linkWhats) {
          const cores = e.cores || {
            primaria: "#ef4444",
            secundaria: "#dc2626",
          };
          const imagens = this._renderizarGaleria(e.imagens, "vip");

          return `
                    <div class="pagina-vip" style="--cor-primaria: ${cores.primaria}; --cor-secundaria: ${cores.secundaria};">
                        <div class="hero-vip">
                            <div class="hero-content">
                                <img src="${e.imagens && e.imagens[0] ? e.imagens[0] : ""}" 
                                     class="logo-vip" 
                                     alt="${e.nome}"
                                     onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22180%22 height=%22180%22><rect fill=%22rgba(255,255,255,0.2)%22 width=%22180%22 height=%22180%22 rx=%2224%22/><text fill=%22white%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2280%22>🏢</text></svg>'">
                                <div class="hero-text">
                                    <div class="badge-vip">🔥 VIP DESTAQUE</div>
                                    <h1>${e.nome}</h1>
                                    <p style="font-size: 18px; opacity: 0.9; margin-top: 8px;">${e.categoria} • ${e.bairro}</p>
                                    <div style="margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
                                        <a href="${linkWhats}" style="background: white; color: var(--cor-primaria); padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600;">
                                            💬 WhatsApp
                                        </a>
                                        ${
                                          e.redes && e.redes.facebook
                                            ? `
                                        <a href="${e.redes.facebook}" target="_blank" rel="noopener noreferrer" style="background: rgba(255,255,255,0.2); color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none;">
                                            Facebook
                                        </a>
                                        `
                                            : ""
                                        }
                                    </div>
                                </div>
                            </div>
                        </div>

                        ${imagens}

                        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
                            <div>
                                <div class="info-card" style="border-left: 4px solid var(--cor-primaria);">
                                    <h3>📝 Sobre a Empresa</h3>
                                    <p style="line-height: 1.8; font-size: 16px;">${e.descricao || "Sem descrição disponível."}</p>
                                </div>

                                ${
                                  e.servicos
                                    ? `
                                <div class="info-card" style="margin-top: 24px; border-left: 4px solid var(--cor-primaria);">
                                    <h3>🛎️ Nossos Serviços</h3>
                                    <div class="servicos-list">
                                        ${e.servicos.map((s) => `<span class="servico-tag" style="background: rgba(239, 68, 68, 0.1); color: var(--cor-primaria);">${s}</span>`).join("")}
                                    </div>
                                </div>
                                `
                                    : ""
                                }

                                ${
                                  e.marketing && e.marketing.keywords
                                    ? `
                                <div class="info-card" style="margin-top: 24px;">
                                    <h3>🏷️ Tags</h3>
                                    <div class="servicos-list">
                                        ${e.marketing.keywords.map((k) => `<span class="servico-tag">${k}</span>`).join("")}
                                    </div>
                                </div>
                                `
                                    : ""
                                }
                            </div>

                            <div>
                                <div class="info-card" style="border-left: 4px solid var(--cor-primaria);">
                                    <h3>📞 Informações</h3>
                                    <p style="font-size: 18px; font-weight: 700;">${e.contacto}</p>
                                    ${e.whatsapp ? `<p style="margin-top: 8px; color: var(--muted);">WhatsApp: +${e.whatsapp}</p>` : ""}
                                    ${e.email ? `<p style="margin-top: 8px; color: var(--muted);">Email: ${e.email}</p>` : ""}
                                    <p style="margin-top: 8px; color: var(--muted);">${e.endereco || e.bairro}</p>
                                    <p style="margin-top: 8px; color: var(--muted);">⏰ ${e.horario}</p>
                                </div>

                                <a href="${linkWhats}" target="_blank" rel="noopener noreferrer" 
                                   style="display: block; background: linear-gradient(135deg, var(--cor-primaria), var(--cor-secundaria)); color: white; padding: 20px; border-radius: 12px; text-align: center; font-size: 18px; font-weight: 600; margin-top: 24px; text-decoration: none;">
                                    💬 Falar no WhatsApp Agora
                                </a>
                            </div>
                        </div>

                        <div style="text-align: center; margin-top: 32px;">
                            <a href="javascript:history.back()" class="btn btn-outline">← Voltar</a>
                        </div>
                    </div>
                `;
        },

        /**
         * Renderiza galeria de imagens Base64
         */
        _renderizarGaleria(imagens, plano) {
          if (!imagens || imagens.length === 0) return "";

          const altura = plano === "vip" ? 250 : 200;

          return `<div class="galeria">
                    ${imagens
                      .map(
                        (img, idx) => `
                        <img src="${img}" 
                             alt="Foto ${idx + 1}" 
                             style="height: ${altura}px;"
                             onclick="abrirLightbox('${img}')"
                             onerror="this.style.display='none'">
                    `,
                      )
                      .join("")}
                </div>`;
        },

        /**
         * Renderiza redes sociais
         */
        _renderizarRedes(redes) {
          const links = [];
          if (redes.facebook)
            links.push({ nome: "Facebook", url: redes.facebook, icone: "f" });
          if (redes.instagram)
            links.push({
              nome: "Instagram",
              url: redes.instagram,
              icone: "📷",
            });

          if (links.length === 0) return "";

          return `<div style="display: flex; gap: 12px; margin-top: 16px;">
                    ${links
                      .map(
                        (r) => `
                        <a href="${r.url}" target="_blank" rel="noopener noreferrer" 
                           style="width: 40px; height: 40px; border-radius: 50%; background: #3b82f6; color: white; display: flex; align-items: center; justify-content: center; text-decoration: none;">
                            ${r.icone}
                        </a>
                    `,
                      )
                      .join("")}
                </div>`;
        },

        naoEncontrada() {
          return `
                    <div class="nao-encontrada">
                        <div style="font-size: 80px; margin-bottom: 24px; opacity: 0.5;">🔍</div>
                        <h2 style="margin-bottom: 12px;">Empresa não encontrada</h2>
                        <p style="color: var(--muted);">A empresa que procura não existe ou foi removida.</p>
                        <a href="index.html" class="btn btn-primary" style="margin-top: 20px;">← Voltar ao início</a>
                    </div>
                `;
        },
      };

      /**
       * ============================================
       * UTILITÁRIOS
       * ============================================
       */
      function abrirLightbox(src) {
        const lightbox = document.getElementById("lightbox");
        const img = document.getElementById("lightboxImg");
        img.src = src;
        lightbox.classList.add("active");
      }

      function fecharLightbox() {
        document.getElementById("lightbox").classList.remove("active");
      }

      function configurarTema() {
        const toggle = document.getElementById("themeToggle");
        const icone = document.getElementById("themeIcon");
        const root = document.documentElement;

        const tema = localStorage.getItem("theme") || "dark";
        root.setAttribute("data-theme", tema);
        icone.textContent = tema === "dark" ? "☀️" : "🌙";

        toggle.addEventListener("click", () => {
          const atual = root.getAttribute("data-theme");
          const proximo = atual === "dark" ? "light" : "dark";
          root.setAttribute("data-theme", proximo);
          localStorage.setItem("theme", proximo);
          icone.textContent = proximo === "dark" ? "☀️" : "🌙";
        });
      }

      /**
       * ============================================
       * INICIALIZAÇÃO
       * ============================================
       */
      function init() {
        document.getElementById("ano").textContent = new Date().getFullYear();
        configurarTema();

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
          document.getElementById("empresaContainer").innerHTML =
            RenderizadorPagina.naoEncontrada();
          return;
        }

        const empresa = ServicoEmpresas.buscarPorId(id);

        if (!empresa) {
          document.getElementById("empresaContainer").innerHTML =
            RenderizadorPagina.naoEncontrada();
          return;
        }

        RenderizadorPagina.renderizar(empresa);

        // Atualizar quando houver mudanças
        window.addEventListener("storage", (e) => {
          if (e.key === CONFIG.CHAVE_EMPRESAS) {
            const atualizada = ServicoEmpresas.buscarPorId(id);
            if (atualizada) {
              RenderizadorPagina.renderizar(atualizada);
            }
          }
        });
      }

      // Iniciar
      document.readyState === "loading"
        ? document.addEventListener("DOMContentLoaded", init)
        : init();
    </script>
  </body>
</html>
